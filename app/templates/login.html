<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в кабинет</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 500px; margin: 50px auto;">
            <h1>Вход в личный кабинет</h1>
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
            <form method="post" action="/login">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Логин</label>
                    <input type="text" name="login" placeholder="Ваш логин" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Пароль</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit">Войти</button>
            </form>
            <hr>
            <p>Нет аккаунта? Напишите боту: <strong>@YourBotUsername</strong> и отправьте <code>/start</code></p>
        </div>
    </div>
</body>
</html>
