<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка - {{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>Админка</h1>
        </div>
        <nav>
            <ul class="sidebar-menu">
                <li><a href="/admin" class="{% if active_page == 'dashboard' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Главная</span>
                </a></li>
                <li><a href="/admin/users" class="{% if active_page == 'users' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span>Пользователи</span>
                </a></li>
                <li><a href="/admin/contents" class="{% if active_page == 'contents' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>Контент</span>
                </a></li>
                <li><a href="/admin/admins" class="{% if active_page == 'admins' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>Администраторы</span>
                </a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Выйти</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header">
            <h2>{{ title }}</h2>
            <div class="header-info">
                <div class="user-info">
                    <div class="username">{{ admin.username }}</div>
                    <div class="role">{% if admin.is_superadmin %}Суперадминистратор{% else %}Администратор{% endif %}</div>
                </div>
                <div class="auto-refresh-info">
                    <span id="last-update">Обновлено: только что</span>
                    <label class="auto-refresh-toggle">
                        <input type="checkbox" id="auto-refresh" checked> Автообновление
                    </label>
                </div>
            </div>
        </header>

        {% block content %}{% endblock %}
    </main>

    <script>
        // Автоматическое обновление данных
        const AUTO_REFRESH_INTERVAL = 5000; // 5 секунд
        let autoRefreshEnabled = true;
        let refreshInterval = null;

        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('auto-refresh');
            if (toggle) {
                toggle.addEventListener('change', function() {
                    autoRefreshEnabled = this.checked;
                    if (autoRefreshEnabled) {
                        startAutoRefresh();
                    } else {
                        stopAutoRefresh();
                    }
                });
                startAutoRefresh();
            }
        });

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(refreshData, AUTO_REFRESH_INTERVAL);
        }

        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }

        function updateLastRefresh() {
            const el = document.getElementById('last-update');
            if (el) {
                const now = new Date();
                el.textContent = 'Обновлено: ' + now.toLocaleTimeString('ru-RU');
            }
        }

        function refreshData() {
            if (!autoRefreshEnabled) return;
            
            const currentPage = window.location.pathname;
            
            if (currentPage === '/admin/users') {
                refreshUsers();
            } else if (currentPage === '/admin') {
                refreshStats();
            } else if (currentPage === '/admin/contents') {
                refreshContents();
            }
        }

        async function refreshUsers() {
            try {
                const response = await fetch('/admin/api/users');
                if (response.ok) {
                    const users = await response.json();
                    updateUsersTable(users);
                    updateLastRefresh();
                }
            } catch (error) {
                console.error('Error refreshing users:', error);
            }
        }

        function updateUsersTable(users) {
            const tbody = document.querySelector('.table tbody');
            if (!tbody) return;
            
            let html = '';
            users.forEach(user => {
                html += `<tr>
                    <td>${user.telegram_id}</td>
                    <td>${user.name}</td>
                    <td>${user.login}</td>
                    <td>${user.email}</td>
                    <td>${user.phone}</td>
                    <td>${user.registered_at}</td>
                    <td>
                        <div class="btn-group">
                            <a href="/admin/users/edit/${user.id}" class="btn btn-sm btn-warning">✏️</a>
                            <form action="/admin/users/delete/${user.id}" method="POST" style="display: inline;" onsubmit="return confirm('Вы уверены, что хотите удалить пользователя?');">
                                <button type="submit" class="btn btn-sm btn-danger">🗑️</button>
                            </form>
                        </div>
                    </td>
                </tr>`;
            });
            
            if (!html) {
                html = '<tr><td colspan="7" style="text-align: center; padding: 40px;">Нет пользователей</td></tr>';
            }
            
            tbody.innerHTML = html;
        }

        async function refreshStats() {
            try {
                const response = await fetch('/admin/api/stats');
                if (response.ok) {
                    const stats = await response.json();
                    updateStatsDisplay(stats);
                    updateLastRefresh();
                }
            } catch (error) {
                console.error('Error refreshing stats:', error);
            }
        }

        function updateStatsDisplay(stats) {
            const statCards = document.querySelectorAll('.stat-card');
            statCards.forEach(card => {
                const key = card.dataset.stat;
                if (key && stats[key] !== undefined) {
                    const valueEl = card.querySelector('.stat-value');
                    if (valueEl) valueEl.textContent = stats[key];
                }
            });
        }

        async function refreshContents() {
            try {
                const response = await fetch('/admin/api/contents');
                if (response.ok) {
                    const contents = await response.json();
                    updateContentsTable(contents);
                    updateLastRefresh();
                }
            } catch (error) {
                console.error('Error refreshing contents:', error);
            }
        }

        function updateContentsTable(contents) {
            const tbody = document.querySelector('.table tbody');
            if (!tbody) return;
            
            let html = '';
            contents.forEach(content => {
                const typeLabels = {
                    'text': '📝 Текст',
                    'photo': '📷 Фото',
                    'video': '🎥 Видео',
                    'link': '🔗 Ссылка'
                };
                html += `<tr>
                    <td>${content.id}</td>
                    <td>${content.user}</td>
                    <td>${typeLabels[content.type] || content.type}</td>
                    <td>${content.content}</td>
                    <td>${content.created_at}</td>
                    <td>
                        <div class="btn-group">
                            <a href="/admin/contents/edit/${content.id}" class="btn btn-sm btn-warning">✏️</a>
                            <form action="/admin/contents/delete/${content.id}" method="POST" style="display: inline;" onsubmit="return confirm('Вы уверены, что хотите удалить контент?');">
                                <button type="submit" class="btn btn-sm btn-danger">🗑️</button>
                            </form>
                        </div>
                    </td>
                </tr>`;
            });
            
            if (!html) {
                html = '<tr><td colspan="6" style="text-align: center; padding: 40px;">Нет контента</td></tr>';
            }
            
            tbody.innerHTML = html;
        }
    </script>
</body>
</html>
