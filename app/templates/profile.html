<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заполнение профиля</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 500px; margin: 50px auto;">
            <h1>Заполните персональные данные</h1>
            <p>Для завершения регистрации укажите свои данные.</p>
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
            <form method="post" action="/profile">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Имя *</label>
                    <input type="text" name="first_name" placeholder="Ваше имя" value="{{ user.first_name or '' }}" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Фамилия</label>
                    <input type="text" name="last_name" placeholder="Ваша фамилия" value="{{ user.last_name or '' }}">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Телефон *</label>
                    <input type="tel" name="phone" placeholder="+7 (999) 000-00-00" value="{{ user.phone or '' }}" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Электронная почта *</label>
                    <input type="email" name="email" placeholder="example@mail.com" value="{{ user.email or '' }}" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Логин для входа *</label>
                    <input type="text" name="login" placeholder="Ваш логин" value="{{ user.login or '' }}" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Пароль для входа *</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit">Завершить регистрацию</button>
            </form>
            <hr>
            <p style="font-size: 12px; color: #6c757d;">* Обязательные поля для заполнения</p>
        </div>
    </div>
</body>
</html>
