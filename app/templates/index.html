<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в кабинет</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 500px; margin: 50px auto;">
            <h1>Вход в личный кабинет</h1>
            <p>Для входа используйте ваш <strong>Telegram ID</strong>. Узнать его можно командой <code>/myid</code> в нашем боте.</p>
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
            <form method="get" action="/cabinet">
                <input type="text" name="user_id" placeholder="Ваш Telegram ID" required>
                <button type="submit">Войти</button>
            </form>
            <hr>
            <p>Нет аккаунта? Напишите боту: <strong>@YourBotUsername</strong> и отправьте <code>/start</code></p>
        </div>
    </div>
</body>
</html>
